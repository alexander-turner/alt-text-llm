name: Publish to PyPI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for trusted publishing

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -o "addopts="

      - name: Type-check with mypy
        run: mypy alt_text_llm

      - name: Lint with ruff
        run: ruff check alt_text_llm

  version-check:
    name: Check if version needs publishing
    needs: test
    # Only publish from pushes to main, never from pull requests.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine whether version already exists on PyPI
        id: check
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^__version__' alt_text_llm/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Local version: ${VERSION}"
          # Query the PyPI JSON API. A 404 means the package/version is new.
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" "https://pypi.org/pypi/alt-text-llm/json" || echo "000")
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "PyPI returned HTTP ${HTTP_STATUS}; assuming version is new."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if python -c "import json,sys; data=json.load(open('response.json')); sys.exit(0 if '${VERSION}' in data.get('releases', {}) else 1)"; then
            echo "Version ${VERSION} already exists on PyPI; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is new; will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to PyPI
    needs: version-check
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a git tag and GitHub Release
      id-token: write # Required for trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/alt-text-llm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No API token needed - uses OIDC trusted publishing
          verbose: true

      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --target "${GITHUB_SHA}"
