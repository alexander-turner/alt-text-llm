name: Tests

on:
  pull_request:
    branches:
      - main
  # Allows the publish workflow to reuse this exact job on pushes to main, so
  # the test matrix is defined in one place and publishing stays gated on it.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Test on the supported floor (requires-python >= 3.11); this is the
          # version most likely to surface compatibility issues and matches the
          # build/publish step.
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -o "addopts="

      - name: Type-check with mypy
        run: mypy alt_text_llm

      - name: Lint with ruff
        run: ruff check alt_text_llm
