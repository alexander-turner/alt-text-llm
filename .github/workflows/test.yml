name: Tests

on:
  pull_request:
    branches:
      - main
  # Allows the publish workflow to reuse this exact job on pushes to main, so
  # the test matrix is defined in one place and publishing stays gated on it.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -o "addopts="

      - name: Type-check with mypy
        run: mypy alt_text_llm

      - name: Lint with ruff
        run: ruff check alt_text_llm
